services:
  sync-server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: shellmate-sync
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - RUST_LOG=info
    volumes:
      - sync-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  sync-data:
    driver: local
