name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint

  rust:
    name: Rust Checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Install system dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install openssl

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Set OpenSSL env (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          echo "OPENSSL_LIB_DIR=/usr/lib/x86_64-linux-gnu" >> $GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=/usr/include/openssl" >> $GITHUB_ENV

      - name: Set OpenSSL env (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          echo "OPENSSL_LIB_DIR=$(brew --prefix openssl)/lib" >> $GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=$(brew --prefix openssl)/include" >> $GITHUB_ENV

      - name: Install OpenSSL (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          choco install openssl -y --no-progress
          # OpenSSL installed by chocolatey to C:\Program Files\OpenSSL-Win64
          # Runner pre-installed OpenSSL at C:\Program Files\OpenSSL
          # Try both paths
          $libDir = if (Test-Path "C:\Program Files\OpenSSL-Win64\lib\VC\x64\MD") {
            "C:\Program Files\OpenSSL-Win64\lib\VC\x64\MD"
          } elseif (Test-Path "C:\Program Files\OpenSSL\lib\VC\x64\MD") {
            "C:\Program Files\OpenSSL\lib\VC\x64\MD"
          } elseif (Test-Path "C:\Program Files\OpenSSL\lib") {
            "C:\Program Files\OpenSSL\lib"
          } else {
            "C:\Program Files\OpenSSL-Win64\lib\VC\x64\MD"
          }
          $incDir = if (Test-Path "C:\Program Files\OpenSSL-Win64\include") {
            "C:\Program Files\OpenSSL-Win64\include"
          } elseif (Test-Path "C:\Program Files\OpenSSL\include") {
            "C:\Program Files\OpenSSL\include"
          } else {
            "C:\Program Files\OpenSSL-Win64\include"
          }
          echo "OPENSSL_LIB_DIR=$libDir" >> $env:GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=$incDir" >> $env:GITHUB_ENV

      - name: Cargo check
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Cargo test
        run: cargo test --manifest-path src-tauri/Cargo.toml --lib

      - name: Cargo clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings
        continue-on-error: true

      - name: Cargo fmt check
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check
        continue-on-error: true

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cargo audit
        run: |
          cargo install cargo-audit
          cargo audit -f src-tauri/Cargo.lock
        continue-on-error: true
